<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фото в PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .hero h1 {
      font-size: clamp(32px, 6vw, 54px);
      margin: 0 0 12px;
    }
    .hero p {
      margin: 0;
      color: #cbd5e1;
      font-size: 18px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 45px rgba(0,0,0,0.25);
    }
    .upload-box {
      border: 2px dashed rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
      background: rgba(255,255,255,0.03);
    }
    .upload-box:hover, .upload-box.dragover {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.08);
      transform: translateY(-2px);
    }
    .upload-box h2 {
      margin: 0 0 10px;
      font-size: 26px;
    }
    .upload-box p {
      margin: 0;
      color: #cbd5e1;
    }
    input[type="file"] {
      display: none;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .left-controls, .right-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    button, select {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
    }
    button {
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary {
      background: #2563eb;
      color: white;
    }
    .secondary {
      background: #334155;
      color: white;
    }
    .danger {
      background: #dc2626;
      color: white;
    }
    select {
      background: #0f172a;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .info {
      margin-top: 14px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .preview-grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .preview-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }
    .preview-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #0f172a;
    }
    .preview-body {
      padding: 12px;
    }
    .preview-title {
      font-size: 14px;
      color: #e2e8f0;
      word-break: break-word;
      margin-bottom: 10px;
    }
    .preview-actions {
      display: flex;
      gap: 8px;
    }
    .preview-actions button {
      flex: 1;
      padding: 10px 12px;
      font-size: 13px;
      border-radius: 12px;
    }
    .empty-state {
      margin-top: 24px;
      color: #94a3b8;
      text-align: center;
      padding: 28px 10px 10px;
    }
    .footer-note {
      margin-top: 28px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }
    @media (max-width: 640px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .left-controls, .right-controls {
        width: 100%;
      }
      .left-controls > *, .right-controls > * {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Фото в PDF</h1>
      <p>Загрузите одно или несколько изображений и скачайте готовый PDF файл</p>
    </div>

    <div class="card">
      <label class="upload-box" id="uploadBox" for="fileInput">
        <h2>Выберите фото</h2>
        <p>Нажмите сюда или перетащите JPG / PNG изображения</p>
      </label>

      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/jpg" multiple />

      <div class="controls">
        <div class="left-controls">
          <button class="primary" id="downloadBtn">Скачать PDF</button>
          <button class="secondary" id="addMoreBtn">Добавить еще фото</button>
          <button class="danger" id="clearBtn">Очистить все</button>
        </div>

        <div class="right-controls">
          <select id="pageFormat">
            <option value="a4">A4</option>
            <option value="letter">Letter</option>
          </select>
          <select id="pageOrientation">
            <option value="portrait">Вертикально</option>
            <option value="landscape">Горизонтально</option>
          </select>
          <select id="fitMode">
            <option value="contain">Поместить целиком</option>
            <option value="cover">Заполнить страницу</option>
          </select>
        </div>
      </div>

      <div class="info" id="infoText">Фотографии еще не выбраны.</div>

      <div class="preview-grid" id="previewGrid"></div>
      <div class="empty-state" id="emptyState">После загрузки здесь появятся превью изображений.</div>
    </div>

    <div class="footer-note">
      Все работает прямо в браузере. Фото не отправляются на сервер.
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const previewGrid = document.getElementById('previewGrid');
    const emptyState = document.getElementById('emptyState');
    const infoText = document.getElementById('infoText');
    const downloadBtn = document.getElementById('downloadBtn');
    const addMoreBtn = document.getElementById('addMoreBtn');
    const clearBtn = document.getElementById('clearBtn');
    const pageFormat = document.getElementById('pageFormat');
    const pageOrientation = document.getElementById('pageOrientation');
    const fitMode = document.getElementById('fitMode');

    let images = [];

    function updateInfo() {
      const count = images.length;
      infoText.textContent = count === 0
        ? 'Фотографии еще не выбраны.'
        : `Загружено: ${count} фото(графий). Каждое изображение станет отдельной страницей PDF.`;
      emptyState.style.display = count === 0 ? 'block' : 'none';
    }

    function renderPreviews() {
      previewGrid.innerHTML = '';

      images.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'preview-item';

        card.innerHTML = `
          <img src="${item.dataUrl}" alt="${item.name}">
          <div class="preview-body">
            <div class="preview-title">${index + 1}. ${item.name}</div>
            <div class="preview-actions">
              <button class="secondary" data-action="up" data-index="${index}">↑ Вверх</button>
              <button class="secondary" data-action="down" data-index="${index}">↓ Вниз</button>
              <button class="danger" data-action="delete" data-index="${index}">Удалить</button>
            </div>
          </div>
        `;

        previewGrid.appendChild(card);
      });

      updateInfo();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({
          name: file.name,
          type: file.type,
          dataUrl: reader.result
        });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handleFiles(fileList) {
      const validFiles = Array.from(fileList).filter(file =>
        ['image/jpeg', 'image/jpg', 'image/png'].includes(file.type)
      );

      if (validFiles.length === 0) {
        alert('Пожалуйста, выберите JPG или PNG изображения.');
        return;
      }

      const newImages = await Promise.all(validFiles.map(fileToDataUrl));
      images = [...images, ...newImages];
      renderPreviews();
    }

    function getImageDimensions(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ width: img.width, height: img.height });
        img.src = dataUrl;
      });
    }

    async function generatePdf() {
      if (images.length === 0) {
        alert('Сначала загрузите хотя бы одно фото.');
        return;
      }

      const pdf = new jsPDF({
        orientation: pageOrientation.value,
        unit: 'mm',
        format: pageFormat.value
      });

      for (let i = 0; i < images.length; i++) {
        if (i > 0) pdf.addPage(pageFormat.value, pageOrientation.value);

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 8;

        const { width: imgWidth, height: imgHeight } = await getImageDimensions(images[i].dataUrl);
        const imgRatio = imgWidth / imgHeight;
        const pageRatio = (pageWidth - margin * 2) / (pageHeight - margin * 2);

        let renderWidth, renderHeight, x, y;

        if (fitMode.value === 'contain') {
          if (imgRatio > pageRatio) {
            renderWidth = pageWidth - margin * 2;
            renderHeight = renderWidth / imgRatio;
          } else {
            renderHeight = pageHeight - margin * 2;
            renderWidth = renderHeight * imgRatio;
          }
          x = (pageWidth - renderWidth) / 2;
          y = (pageHeight - renderHeight) / 2;
        } else {
          if (imgRatio > pageRatio) {
            renderHeight = pageHeight;
            renderWidth = renderHeight * imgRatio;
          } else {
            renderWidth = pageWidth;
            renderHeight = renderWidth / imgRatio;
          }
          x = (pageWidth - renderWidth) / 2;
          y = (pageHeight - renderHeight) / 2;
        }

        const format = images[i].type.includes('png') ? 'PNG' : 'JPEG';
        pdf.addImage(images[i].dataUrl, format, x, y, renderWidth, renderHeight);
      }

      pdf.save('photos-to-pdf.pdf');
    }

    uploadBox.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadBox.classList.add('dragover');
    });

    uploadBox.addEventListener('dragleave', () => {
      uploadBox.classList.remove('dragover');
    });

    uploadBox.addEventListener('drop', async (e) => {
      e.preventDefault();
      uploadBox.classList.remove('dragover');
      await handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', async (e) => {
      await handleFiles(e.target.files);
      fileInput.value = '';
    });

    addMoreBtn.addEventListener('click', () => fileInput.click());
    downloadBtn.addEventListener('click', generatePdf);

    clearBtn.addEventListener('click', () => {
      images = [];
      renderPreviews();
    });

    previewGrid.addEventListener('click', (e) => {
      const button = e.target.closest('button');
      if (!button) return;

      const index = Number(button.dataset.index);
      const action = button.dataset.action;

      if (action === 'delete') {
        images.splice(index, 1);
      }

      if (action === 'up' && index > 0) {
        [images[index - 1], images[index]] = [images[index], images[index - 1]];
      }

      if (action === 'down' && index < images.length - 1) {
        [images[index + 1], images[index]] = [images[index], images[index + 1]];
      }

      renderPreviews();
    });

    renderPreviews();
  </script>
</body>
</html>
