<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BizTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F0;
  --surface: #FFFFFF;
  --surface2: #EEEDE9;
  --border: rgba(0,0,0,0.08);
  --text: #111111;
  --muted: #888880;
  --accent: #C0272D;
  --accent-bg: rgba(192,39,45,0.08);
  --green: #1A7A4A;
  --green-bg: rgba(26,122,74,0.09);
  --nav-h: 68px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
}

/* ── Pages ─────────────────────────────────────── */
.page { display: none; padding: 24px 16px 0; animation: fadeUp .22s ease; }
.page.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

/* ── Header ─────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-family: 'Lora', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
}
.page-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ── Stat Cards ─────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
.stat {
  background: var(--surface);
  border-radius: 14px;
  padding: 16px;
  border: 1px solid var(--border);
}
.stat.full { grid-column: 1/-1; }
.stat-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.stat-val {
  font-family: 'Lora', serif;
  font-size: 26px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}
.stat-val.green  { color: var(--green); }
.stat-val.red    { color: var(--accent); }
.stat-val.accent { color: var(--accent); }
.stat-hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

/* ── Section title ──────────────────────────────── */
.section-head {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  margin-top: 4px;
}

/* ── List ───────────────────────────────────────── */
.list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.list-item {
  background: var(--surface);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border);
  transition: background .15s;
}
.list-item:active { background: var(--surface2); }
.item-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}
.item-body { flex: 1; min-width: 0; }
.item-title {
  font-weight: 500;
  font-size: 14.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.item-right { text-align: right; flex-shrink: 0; }
.item-amount {
  font-family: 'Lora', serif;
  font-size: 15px;
  font-weight: 600;
}
.item-amount.green { color: var(--green); }
.item-amount.red   { color: var(--accent); }
.item-actions { display: flex; gap: 6px; margin-top: 4px; justify-content: flex-end; }

/* ── Badge ──────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.badge-stock  { background: var(--green-bg); color: var(--green); }
.badge-sold   { background: var(--accent-bg); color: var(--accent); }
.badge-cat    { background: var(--surface2); color: var(--muted); }

/* ── Buttons ────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 13px;
  border-radius: 8px;
  font-size: 12.5px;
  font-weight: 500;
  font-family: 'Outfit', sans-serif;
  border: none;
  cursor: pointer;
  transition: opacity .15s;
}
.btn:active { opacity: .7; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-primary { background: var(--accent); color: white; }
.btn-ghost   { background: var(--surface2); color: var(--muted); }
.btn-green   { background: var(--green-bg); color: var(--green); border: 1px solid transparent; }
.btn-danger  { background: var(--accent-bg); color: var(--accent); border: 1px solid transparent; }

/* ── Filter tabs ────────────────────────────────── */
.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  font-family: 'Outfit', sans-serif;
}
.filter-pill.active {
  background: var(--text);
  color: white;
  border-color: var(--text);
}

/* ── Search ─────────────────────────────────────── */
.search-wrap {
  position: relative;
  margin-bottom: 14px;
}
.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

/* ── Empty state ────────────────────────────────── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: .4; }
.empty p { font-size: 14px; }

/* ── Bottom Nav ─────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 8px;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 0;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'Outfit', sans-serif;
  color: var(--muted);
  transition: color .15s;
  font-size: 11px;
  font-weight: 500;
}
.nav-item.active { color: var(--accent); }
.nav-icon {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
}
.nav-fab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 2px 0;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  transition: color .15s;
}
.fab-circle {
  width: 42px; height: 42px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px rgba(192,39,45,.35);
  transition: transform .15s;
}
.nav-fab:active .fab-circle { transform: scale(0.92); }

/* ── Modal ──────────────────────────────────────── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(6px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 540px;
  max-height: 92vh;
  overflow-y: auto;
  animation: sheetUp .25s cubic-bezier(.32,1,.56,1);
  padding-bottom: calc(20px + var(--safe-bottom));
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 12px auto 20px;
}
.modal-title {
  font-family: 'Lora', serif;
  font-size: 20px;
  font-weight: 600;
  padding: 0 20px;
  margin-bottom: 20px;
}
.modal-body { padding: 0 20px; }
.modal-footer {
  padding: 16px 20px 0;
  display: flex;
  gap: 8px;
}
.modal-footer .btn { flex: 1; justify-content: center; padding: 12px; font-size: 14px; }

/* ── Form ───────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .5px;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  font-size: 14.5px;
  color: var(--text);
  outline: none;
  appearance: none;
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  background: var(--surface);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-textarea { min-height: 70px; resize: vertical; }

/* ── Type selector ──────────────────────────────── */
.type-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 18px;
  padding: 0 20px;
}
.type-btn {
  padding: 10px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  text-align: center;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  transition: all .15s;
}
.type-btn.active {
  border-color: var(--accent);
  background: var(--accent-bg);
  color: var(--accent);
}

/* ── Toast ──────────────────────────────────────── */
.toast-wrap {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
  pointer-events: none;
}
.toast {
  background: #111;
  color: white;
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 13.5px;
  font-weight: 500;
  white-space: nowrap;
  transform: translateY(20px);
  opacity: 0;
  transition: all .25s cubic-bezier(.32,1,.56,1);
}
.toast.show { transform: none; opacity: 1; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     PAGES
═══════════════════════════════════════════════ -->

<!-- Dashboard -->
<div class="page active" id="page-dashboard">
  <div class="page-header">
    <div>
      <div class="page-title">BizTrack</div>
      <div class="page-sub" id="dash-date"></div>
    </div>
  </div>
  <div class="stats-grid" id="dash-stats">
    <div class="stat full"><div class="stat-label">Чистая прибыль</div><div class="stat-val green" id="s-profit">—</div><div class="stat-hint">Доход − Расходы</div></div>
    <div class="stat"><div class="stat-label">Доход</div><div class="stat-val green" id="s-revenue">—</div></div>
    <div class="stat"><div class="stat-label">Расходы</div><div class="stat-val red" id="s-expense">—</div></div>
    <div class="stat"><div class="stat-label">За месяц</div><div class="stat-val accent" id="s-month">—</div><div class="stat-hint" id="s-month-name"></div></div>
    <div class="stat"><div class="stat-label">Продано</div><div class="stat-val" id="s-sold">—</div><div class="stat-hint" id="s-stock"></div></div>
  </div>

  <div class="section-head">Последние операции</div>
  <div class="list" id="dash-recent"></div>
</div>

<!-- Inventory -->
<div class="page" id="page-inventory">
  <div class="page-header">
    <div class="page-title">Склад</div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" id="inv-search" placeholder="Поиск товара…" oninput="renderInventory()">
  </div>
  <div class="filters">
    <button class="filter-pill active" onclick="setFilter('inv','all',this)">Все</button>
    <button class="filter-pill" onclick="setFilter('inv','in_stock',this)">На складе</button>
    <button class="filter-pill" onclick="setFilter('inv','sold',this)">Продано</button>
  </div>
  <div class="list" id="inv-list"></div>
</div>

<!-- Services -->
<div class="page" id="page-services">
  <div class="page-header">
    <div class="page-title">Услуги</div>
  </div>
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat"><div class="stat-label">Всего услуг</div><div class="stat-val green" id="svc-total">—</div></div>
    <div class="stat"><div class="stat-label">За месяц</div><div class="stat-val" id="svc-month">—</div></div>
  </div>
  <div class="list" id="svc-list"></div>
</div>

<!-- ═══════════════════════════════════════════════
     BOTTOM NAV
═══════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-dashboard" onclick="goPage('dashboard')">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
    </div>
    Главная
  </button>
  <button class="nav-item" id="nav-inventory" onclick="goPage('inventory')">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    Склад
  </button>
  <button class="nav-fab" onclick="openAddModal()">
    <div class="fab-circle">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
    Добавить
  </button>
  <button class="nav-item" id="nav-services" onclick="goPage('services')">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
      </svg>
    </div>
    Услуги
  </button>
  <button class="nav-item" id="nav-more" onclick="showStats()">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </div>
    Статистика
  </button>
</nav>

<!-- ═══════════════════════════════════════════════
     MODAL — ADD / EDIT
═══════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Добавить</div>

    <!-- Type selector (only for add) -->
    <div class="type-selector" id="modal-type-selector">
      <button class="type-btn active" id="type-inv" onclick="setModalType('inventory')">📦 Товар</button>
      <button class="type-btn" id="type-svc" onclick="setModalType('service')">🛠 Услуга</button>
    </div>

    <div class="modal-body">
      <!-- Inventory fields -->
      <div id="fields-inventory">
        <div class="form-group">
          <label class="form-label">Название *</label>
          <input id="f-title" class="form-input" placeholder="Ноутбук, телефон…">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Категория</label>
            <select id="f-category" class="form-select">
              <option>Ноутбук</option><option>Телефон</option><option>Планшет</option>
              <option>Монитор</option><option>Компьютер</option><option>Комплектующие</option>
              <option>Аксессуары</option><option>Другое</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Дата закупки</label>
            <input id="f-purchase-date" type="date" class="form-input">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Закупил за (₸)</label>
            <input id="f-buy-price" type="number" class="form-input" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Продам за (₸)</label>
            <input id="f-sell-price" type="number" class="form-input" placeholder="0" min="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Заметки</label>
          <textarea id="f-notes" class="form-textarea" placeholder="Состояние, серийный номер…"></textarea>
        </div>
      </div>

      <!-- Service fields -->
      <div id="fields-service" style="display:none">
        <div class="form-group">
          <label class="form-label">Тип услуги</label>
          <select id="f-svc-type" class="form-select">
            <option>Установка Windows</option><option>Создание сайта</option>
            <option>Настройка ПК</option><option>Ремонт техники</option>
            <option>IT-консультация</option><option>Другое</option>
          </select>
        </div>
        <div class="form-group" id="f-svc-custom-wrap" style="display:none">
          <label class="form-label">Название услуги</label>
          <input id="f-svc-custom" class="form-input" placeholder="Своё название…">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Сумма (₸) *</label>
            <input id="f-svc-amount" type="number" class="form-input" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Дата</label>
            <input id="f-svc-date" type="date" class="form-input">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Описание</label>
          <textarea id="f-svc-desc" class="form-textarea" placeholder="Детали работы…"></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveItem()" id="modal-save-btn">Сохранить</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toasts"></div>

<!-- ═══════════════════════════════════════════════
     JS
═══════════════════════════════════════════════ -->
<script>
// ── Data ─────────────────────────────────────────
const STORE = {
  inv: JSON.parse(localStorage.getItem('biz_inv') || '[]'),
  svc: JSON.parse(localStorage.getItem('biz_svc') || '[]'),
  save() {
    localStorage.setItem('biz_inv', JSON.stringify(this.inv));
    localStorage.setItem('biz_svc', JSON.stringify(this.svc));
  }
};

// ── State ─────────────────────────────────────────
let currentPage   = 'dashboard';
let invFilter     = 'all';
let modalMode     = 'add';    // 'add' | 'edit-inv' | 'edit-svc'
let modalType     = 'inventory';
let editingId     = null;

// ── Utils ─────────────────────────────────────────
const fmt = n => (Number(n)||0).toLocaleString('ru-RU') + ' ₸';
const today = () => new Date().toISOString().split('T')[0];
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const monthOf = d => d ? d.slice(0,7) : '';
const thisMonth = () => new Date().toISOString().slice(0,7);

function isThisMonth(dateStr) {
  return monthOf(dateStr) === thisMonth();
}

function toast(msg, duration = 2500) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, duration);
}

// ── Navigation ────────────────────────────────────
function goPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  currentPage = page;
  if (page === 'dashboard') renderDashboard();
  if (page === 'inventory') renderInventory();
  if (page === 'services')  renderServices();
}

// ── Dashboard ─────────────────────────────────────
function renderDashboard() {
  const now = new Date();
  document.getElementById('dash-date').textContent =
    now.toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long' });

  const inv = STORE.inv;
  const svc = STORE.svc;

  const totalExpense  = inv.reduce((s,i) => s + (Number(i.buy_price)||0), 0);
  const soldItems     = inv.filter(i => i.status === 'sold');
  const revSales      = soldItems.reduce((s,i) => s + (Number(i.sell_price)||0), 0);
  const revServices   = svc.reduce((s,i) => s + (Number(i.amount)||0), 0);
  const totalRevenue  = revSales + revServices;
  const netProfit     = totalRevenue - totalExpense;

  const mSales = soldItems.filter(i => isThisMonth(i.sold_date)).reduce((s,i) => s+(Number(i.sell_price)||0),0);
  const mSvc   = svc.filter(i => isThisMonth(i.date)).reduce((s,i) => s+(Number(i.amount)||0),0);

  document.getElementById('s-profit').textContent  = fmt(netProfit);
  document.getElementById('s-profit').className    = 'stat-val ' + (netProfit >= 0 ? 'green' : 'red');
  document.getElementById('s-revenue').textContent = fmt(totalRevenue);
  document.getElementById('s-expense').textContent = fmt(totalExpense);
  document.getElementById('s-month').textContent   = fmt(mSales + mSvc);
  document.getElementById('s-month-name').textContent =
    now.toLocaleDateString('ru-RU', { month: 'long' });
  document.getElementById('s-sold').textContent    = soldItems.length + ' шт';
  document.getElementById('s-stock').textContent   = 'На складе: ' + inv.filter(i=>i.status==='in_stock').length;

  // Recent (last 8, mixed)
  const recent = [
    ...soldItems.map(i => ({ type:'sale', date: i.sold_date, name: i.title, amount: i.sell_price, cat: i.category })),
    ...svc.map(s => ({ type:'service', date: s.date, name: s.service_name, amount: s.amount, cat: 'Услуга' }))
  ].sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1).slice(0,8);

  const el = document.getElementById('dash-recent');
  if (!recent.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>Добавьте первую операцию</p></div>`;
    return;
  }
  el.innerHTML = recent.map(r => `
    <div class="list-item">
      <div class="item-icon">${r.type==='sale' ? '📦' : '🛠'}</div>
      <div class="item-body">
        <div class="item-title">${esc(r.name)}</div>
        <div class="item-meta">${esc(r.cat)} · ${fmtDate(r.date)}</div>
      </div>
      <div class="item-right">
        <div class="item-amount green">+${fmt(r.amount)}</div>
      </div>
    </div>
  `).join('');
}

// ── Inventory ─────────────────────────────────────
function setFilter(area, val, btn) {
  if (area === 'inv') invFilter = val;
  btn.closest('.filters').querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInventory();
}

function renderInventory() {
  const q = (document.getElementById('inv-search')?.value || '').toLowerCase();
  let items = STORE.inv.filter(i => {
    if (invFilter !== 'all' && i.status !== invFilter) return false;
    if (q && !i.title.toLowerCase().includes(q)) return false;
    return true;
  });

  const el = document.getElementById('inv-list');
  if (!items.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><p>Ничего нет</p></div>`;
    return;
  }

  el.innerHTML = items.map(i => {
    const margin = (Number(i.sell_price)||0) - (Number(i.buy_price)||0);
    const isSold = i.status === 'sold';
    return `
    <div class="list-item">
      <div class="item-icon">📦</div>
      <div class="item-body">
        <div class="item-title">${esc(i.title)}</div>
        <div class="item-meta">
          <span class="badge badge-cat">${esc(i.category)}</span>
          <span class="badge ${isSold ? 'badge-sold' : 'badge-stock'}" style="margin-left:4px">${isSold ? 'Продан' : 'На складе'}</span>
        </div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
          ${!isSold ? `<button class="btn btn-sm btn-green" onclick="markSold('${i.id}')">✓ Продан</button>` : ''}
          <button class="btn btn-sm btn-ghost" onclick="editInv('${i.id}')">Изменить</button>
          <button class="btn btn-sm btn-danger" onclick="deleteInv('${i.id}')">Удалить</button>
        </div>
      </div>
      <div class="item-right">
        <div class="item-amount" style="font-size:13.5px">${fmt(i.buy_price)}</div>
        ${i.sell_price ? `<div style="font-size:12px;color:var(--muted)">→ ${fmt(i.sell_price)}</div>` : ''}
        ${i.sell_price ? `<div style="font-size:12px;color:${margin>=0?'var(--green)':'var(--accent)'}">${margin>=0?'+':''}${fmt(margin)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function markSold(id) {
  const item = STORE.inv.find(i => i.id === id);
  if (!item) return;
  item.status = 'sold';
  item.sold_date = today();
  STORE.save();
  toast('Отмечено как продано ✓');
  renderInventory();
  renderDashboard();
}

function deleteInv(id) {
  if (!confirm('Удалить товар?')) return;
  STORE.inv = STORE.inv.filter(i => i.id !== id);
  STORE.save();
  toast('Удалено');
  renderInventory();
  renderDashboard();
}

function editInv(id) {
  const item = STORE.inv.find(i => i.id === id);
  if (!item) return;
  openModal('edit-inv');
  editingId = id;
  document.getElementById('modal-title').textContent = 'Изменить товар';
  document.getElementById('f-title').value = item.title || '';
  document.getElementById('f-category').value = item.category || 'Другое';
  document.getElementById('f-purchase-date').value = item.purchase_date || today();
  document.getElementById('f-buy-price').value = item.buy_price || '';
  document.getElementById('f-sell-price').value = item.sell_price || '';
  document.getElementById('f-notes').value = item.notes || '';
}

// ── Services ──────────────────────────────────────
function renderServices() {
  const svc = STORE.svc;
  const total = svc.reduce((s,i) => s+(Number(i.amount)||0), 0);
  const month = svc.filter(i=>isThisMonth(i.date)).reduce((s,i)=>s+(Number(i.amount)||0),0);
  document.getElementById('svc-total').textContent = fmt(total);
  document.getElementById('svc-month').textContent = fmt(month);

  const el = document.getElementById('svc-list');
  if (!svc.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🛠</div><p>Услуг пока нет</p></div>`;
    return;
  }
  const sorted = [...svc].sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);
  el.innerHTML = sorted.map(s => `
    <div class="list-item">
      <div class="item-icon">🛠</div>
      <div class="item-body">
        <div class="item-title">${esc(s.service_name)}</div>
        <div class="item-meta">${s.description ? esc(s.description) + ' · ' : ''}${fmtDate(s.date)}</div>
        <div style="margin-top:6px;display:flex;gap:6px">
          <button class="btn btn-sm btn-ghost" onclick="editSvc('${s.id}')">Изменить</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSvc('${s.id}')">Удалить</button>
        </div>
      </div>
      <div class="item-right">
        <div class="item-amount green">+${fmt(s.amount)}</div>
      </div>
    </div>
  `).join('');
}

function deleteSvc(id) {
  if (!confirm('Удалить услугу?')) return;
  STORE.svc = STORE.svc.filter(s => s.id !== id);
  STORE.save();
  toast('Удалено');
  renderServices();
  renderDashboard();
}

function editSvc(id) {
  const s = STORE.svc.find(i => i.id === id);
  if (!s) return;
  openModal('edit-svc');
  editingId = id;
  document.getElementById('modal-title').textContent = 'Изменить услугу';
  const known = ['Установка Windows','Создание сайта','Настройка ПК','Ремонт техники','IT-консультация'];
  if (known.includes(s.service_name)) {
    document.getElementById('f-svc-type').value = s.service_name;
    document.getElementById('f-svc-custom-wrap').style.display = 'none';
  } else {
    document.getElementById('f-svc-type').value = 'Другое';
    document.getElementById('f-svc-custom-wrap').style.display = 'block';
    document.getElementById('f-svc-custom').value = s.service_name;
  }
  document.getElementById('f-svc-amount').value = s.amount || '';
  document.getElementById('f-svc-date').value = s.date || today();
  document.getElementById('f-svc-desc').value = s.description || '';
}

// ── Modal ─────────────────────────────────────────
function openAddModal() {
  openModal('add');
  setModalType('inventory');
}

function openModal(mode) {
  modalMode = mode;
  editingId = null;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  const isEdit = mode.startsWith('edit');
  document.getElementById('modal-type-selector').style.display = isEdit ? 'none' : 'grid';

  if (mode === 'add') {
    document.getElementById('modal-title').textContent = 'Добавить';
    resetFields();
  }

  if (mode === 'edit-inv') {
    showFields('inventory');
  }
  if (mode === 'edit-svc') {
    showFields('service');
  }
}

function showFields(type) {
  document.getElementById('fields-inventory').style.display = type === 'inventory' ? 'block' : 'none';
  document.getElementById('fields-service').style.display   = type === 'service'   ? 'block' : 'none';
}

function setModalType(type) {
  modalType = type;
  document.getElementById('type-inv').classList.toggle('active', type === 'inventory');
  document.getElementById('type-svc').classList.toggle('active', type === 'service');
  showFields(type);
}

function resetFields() {
  ['f-title','f-buy-price','f-sell-price','f-notes'].forEach(id => document.getElementById(id).value = '');
  ['f-svc-amount','f-svc-custom','f-svc-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-purchase-date').value = today();
  document.getElementById('f-svc-date').value = today();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// service type custom field
document.getElementById('f-svc-type').addEventListener('change', function() {
  document.getElementById('f-svc-custom-wrap').style.display =
    this.value === 'Другое' ? 'block' : 'none';
});

function saveItem() {
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.textContent = 'Сохраняю…';

  try {
    const type = modalMode === 'edit-svc' ? 'service' : (modalMode === 'edit-inv' ? 'inventory' : modalType);

    if (type === 'inventory') {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { toast('Введите название'); return; }
      const obj = {
        id: editingId || uid(),
        title,
        category:      document.getElementById('f-category').value,
        purchase_date: document.getElementById('f-purchase-date').value || today(),
        buy_price:     Number(document.getElementById('f-buy-price').value) || 0,
        sell_price:    Number(document.getElementById('f-sell-price').value) || 0,
        notes:         document.getElementById('f-notes').value.trim(),
        status:        'in_stock',
        sold_date:     null,
        created_at:    editingId ? undefined : new Date().toISOString(),
      };
      if (editingId) {
        const idx = STORE.inv.findIndex(i => i.id === editingId);
        if (idx !== -1) { const old = STORE.inv[idx]; STORE.inv[idx] = {...old, ...obj}; }
      } else {
        STORE.inv.unshift(obj);
      }
      STORE.save();
      toast(editingId ? 'Товар обновлён ✓' : 'Товар добавлен ✓');
      renderInventory(); renderDashboard();

    } else {
      const svcType = document.getElementById('f-svc-type').value;
      const custom  = document.getElementById('f-svc-custom').value.trim();
      const name    = (svcType === 'Другое' && custom) ? custom : svcType;
      const amount  = Number(document.getElementById('f-svc-amount').value) || 0;
      if (!amount) { toast('Введите сумму'); return; }
      const obj = {
        id:           editingId || uid(),
        service_name: name,
        amount,
        date:         document.getElementById('f-svc-date').value || today(),
        description:  document.getElementById('f-svc-desc').value.trim(),
        created_at:   editingId ? undefined : new Date().toISOString(),
      };
      if (editingId) {
        const idx = STORE.svc.findIndex(s => s.id === editingId);
        if (idx !== -1) { const old = STORE.svc[idx]; STORE.svc[idx] = {...old, ...obj}; }
      } else {
        STORE.svc.unshift(obj);
      }
      STORE.save();
      toast(editingId ? 'Услуга обновлена ✓' : 'Услуга добавлена ✓');
      renderServices(); renderDashboard();
    }
    closeModal();
  } finally {
    btn.disabled = false; btn.textContent = 'Сохранить';
  }
}

// ── Stats popup ───────────────────────────────────
function showStats() {
  const inv = STORE.inv;
  const svc = STORE.svc;
  const soldItems = inv.filter(i => i.status === 'sold');
  const resale = soldItems.reduce((s,i) => s + ((Number(i.sell_price)||0)-(Number(i.buy_price)||0)), 0);
  const months = {};
  [...soldItems.map(i=>({date:i.sold_date,amount:i.sell_price})),
   ...svc.map(s=>({date:s.date,amount:s.amount}))].forEach(r => {
    const m = monthOf(r.date); if (!m) return;
    months[m] = (months[m]||0) + (Number(r.amount)||0);
  });
  const sortedMonths = Object.entries(months).sort((a,b)=>b[0]>a[0]?1:-1).slice(0,5);
  const maxVal = Math.max(...sortedMonths.map(m=>m[1]), 1);

  // Temporary modal-like view
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center';
  el.innerHTML = `
    <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:540px;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));animation:sheetUp .25s cubic-bezier(.32,1,.56,1)">
      <div style="width:36px;height:4px;background:#eee;border-radius:4px;margin:0 auto 20px"></div>
      <div style="font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:20px">Статистика</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div style="background:#f5f4f0;border-radius:12px;padding:14px">
          <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Маржа с продаж</div>
          <div style="font-family:'Lora',serif;font-size:22px;color:${resale>=0?'var(--green)':'var(--accent)'}">${fmt(resale)}</div>
        </div>
        <div style="background:#f5f4f0;border-radius:12px;padding:14px">
          <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Всего операций</div>
          <div style="font-family:'Lora',serif;font-size:22px">${soldItems.length + svc.length}</div>
        </div>
      </div>
      ${sortedMonths.length ? `
        <div style="font-size:12px;font-weight:500;letter-spacing:.8px;color:#888;text-transform:uppercase;margin-bottom:12px">По месяцам</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${sortedMonths.map(([m,v]) => {
            const pct = Math.round((v/maxVal)*100);
            const label = new Date(m+'-01').toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
            return `<div>
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
                <span style="color:#555">${label}</span>
                <span style="font-weight:600">${fmt(v)}</span>
              </div>
              <div style="height:6px;background:#eee;border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:3px;transition:width .5s"></div>
              </div>
            </div>`;
          }).join('')}
        </div>
      ` : '<div style="text-align:center;padding:20px;color:#aaa;font-size:14px">Данных пока нет</div>'}
      <button onclick="this.closest('[style]').remove()" style="margin-top:20px;width:100%;padding:12px;border:1px solid #eee;border-radius:10px;background:none;font-family:Outfit,sans-serif;font-size:14px;font-weight:500;color:#888;cursor:pointer">Закрыть</button>
    </div>`;
  el.addEventListener('click', e => { if (e.target === el) el.remove(); });
  document.body.appendChild(el);
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}

// ── Init ──────────────────────────────────────────
renderDashboard();
</script>
</body>
</html>
